<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - GitHub Issues Tracker</title>

  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center px-4">

  <div class="w-full max-w-md bg-white rounded-2xl shadow-lg border border-slate-200 p-8">

    <!-- logo -->
    <div class="flex justify-center mb-5">
     
      <img src="./assets/github-logo.png" alt="Logo" class="w-16 h-16 object-contain">
    </div>

    <!-- title -->
    <h1 class="text-3xl font-bold text-center text-slate-800">
      GitHub Issues Tracker
    </h1>

    <p class="text-center text-slate-500 mt-2 mb-6">
      Sign in to manage your issues
    </p>

    <!-- username -->
    <div class="mb-4">
      <label for="username" class="block text-sm font-medium text-slate-700 mb-2">
        Username
      </label>
      <input
        id="username"
        type="text"
        placeholder="Enter username"
        class="input input-bordered w-full bg-white text-slate-800"
      />
      <p class="text-xs text-violet-600 mt-2">Default: admin</p>
    </div>

    <!-- password -->
    <div class="mb-4">
      <label for="password" class="block text-sm font-medium text-slate-700 mb-2">
        Password
      </label>
      <input
        id="password"
        type="password"
        placeholder="Enter password"
        class="input input-bordered w-full bg-white text-slate-800"
      />
      <p class="text-xs text-violet-600 mt-2">Default: admin123</p>
    </div>

    <!-- error -->
    <p id="loginError" class="hidden text-sm text-red-500 mb-3">
      Invalid username or password
    </p>

    <!-- button -->
    <button
      id="loginBtn"
      class="btn w-full bg-gradient-to-r from-violet-600 to-fuchsia-500 hover:from-violet-700 hover:to-fuchsia-600 text-white border-0"
    >
      Sign In
    </button>

    <div class="mt-6 text-center text-slate-500">
      <p class="text-sm">Demo Credentials:</p>
      <p class="text-sm font-medium mt-1">admin / admin123</p>
    </div>

  </div>

  <script src="login.js"></script>
</body>
</html>
