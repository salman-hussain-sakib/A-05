<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issues Tracker</title>

    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        .custom-shadow {
            box-shadow: 0 2px 8px rgba(15, 23, 42, 0.06);
        }
    </style>
</head>

<body class="bg-[#F8FAFC] min-h-screen">
    <!-- navbar -->
    <nav class="bg-white border-b border-slate-200">
        <div class="max-w-7xl mx-auto px-4 py-4 flex flex-col gap-4 md:flex-row md:items-center md:justify-between">

            <div class="flex items-center gap-3">
               
                <img src="./assets/github-logo.png" alt="Logo" class="w-8 h-8 object-contain">

                <h1 class="text-lg md:text-xl font-bold text-slate-800">
                    GitHub Issues Tracker
                </h1>
            </div>

            <div class="flex items-center gap-2 w-full md:w-auto">
                <input id="searchInput" type="text" placeholder="Search issues..."
                    class="input input-bordered bg-white text-slate-800 w-full md:w-72">

                <button id="searchBtn" class="btn bg-violet-600 hover:bg-violet-700 text-white border-0">
                    Search
                </button>

                <button class="btn bg-violet-600 hover:bg-violet-700 text-white border-0">
                    + New Issue
                </button>
            </div>
        </div>
    </nav>
    <!-- main -->
    <main class="max-w-7xl mx-auto px-4 py-6">
        <section class="bg-white rounded-2xl custom-shadow border border-slate-200 p-4 md:p-6">

            <!-- tabs -->
            <div class="tabs tabs-boxed bg-slate-100 w-fit p-1 rounded-lg">
                <button class="tab tab-active font-medium" data-tab="all">All</button>
                <button class="tab font-medium" data-tab="open">Open</button>
                <button class="tab font-medium" data-tab="closed">Closed</button>
            </div>

            <!-- summary -->
            <div
                class="mt-6 flex flex-col gap-4 md:flex-row md:items-center md:justify-between border border-slate-200 rounded-xl p-5 bg-white">
                <div class="flex items-center gap-4">

                    
                    <div class="w-14 h-14 rounded-full bg-violet-100 flex items-center justify-center">
                        <img src="./assets/Aperture.png" alt="Issue Icon" class="w-8 h-8 object-contain">
                    </div>

                    <div>
                        <h2 class="text-[18px] font-bold text-slate-800">
                            <span id="issueCount">0</span> Issues
                        </h2>
                        <p class="text-[15px] text-slate-500">
                            Track and manage your project issues
                        </p>
                    </div>
                </div>

                <div class="flex items-center gap-5 text-sm text-slate-600">
                    <div class="flex items-center gap-2">
                        <span class="w-3 h-3 rounded-full bg-[#10B981] inline-block"></span>
                        <span>Open</span>
                    </div>

                    <div class="flex items-center gap-2">
                        <span class="w-3 h-3 rounded-full bg-[#A855F7] inline-block"></span>
                        <span>Closed</span>
                    </div>
                </div>
            </div>

            <!-- spinner -->
            <div id="spinner" class="hidden py-10 text-center">
                <span class="loading loading-spinner loading-lg text-violet-600"></span>
            </div>
            <!-- cards -->
            <div id="issuesContainer" class="mt-6 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
            </div>

            <!-- empty -->
            <div id="emptyState" class="hidden text-center py-16">
                <h3 class="text-xl font-semibold text-slate-700">No issues found</h3>
                <p class="text-slate-500 mt-2">Try another category or search keyword.</p>
            </div>

        </section>
    </main>

    <!-- modal -->
    <dialog id="issueModal" class="modal">
        <div class="modal-box max-w-2xl rounded-2xl">
            <h3 id="modalTitle" class="text-2xl font-bold text-slate-800">
                Issue Title
            </h3>

            <div class="mt-3 flex flex-wrap gap-2">
                <span id="modalStatus" class="badge badge-success">Open</span>
                <span id="modalCategory" class="badge badge-outline">Bug</span>
                <span id="modalPriority" class="badge badge-error">High</span>
            </div>

            <p id="modalDescription" class="py-4 text-slate-600 leading-7">
                Full issue description will show here.
            </p>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="bg-slate-50 rounded-lg p-3">
                    <p class="text-sm text-slate-500">Author</p>
                    <p id="modalAuthor" class="font-semibold text-slate-800">Author Name</p>
                </div>

                <div class="bg-slate-50 rounded-lg p-3">
                    <p class="text-sm text-slate-500">Created At</p>
                    <p id="modalCreatedAt" class="font-semibold text-slate-800">Date</p>
                </div>

                <div class="bg-slate-50 rounded-lg p-3">
                    <p class="text-sm text-slate-500">Label</p>
                    <p id="modalLabel" class="font-semibold text-slate-800">Label Name</p>
                </div>

                <div class="bg-slate-50 rounded-lg p-3">
                    <p class="text-sm text-slate-500">Priority</p>
                    <p id="modalPriorityText" class="font-semibold text-slate-800">High</p>
                </div>
            </div>

            <div class="modal-action">
                <form method="dialog">
                    <button class="btn bg-violet-600 hover:bg-violet-700 text-white border-0">
                        Close
                    </button>
                </form>
            </div>
        </div>
    </dialog>

    <script src="main.js"></script>
</body>

</html>
